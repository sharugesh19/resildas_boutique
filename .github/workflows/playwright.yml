name: QA — Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {} # lets you manually trigger a run from the GitHub Actions tab

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests against live deployment
        run: npx playwright test
        env:
          BASE_URL: https://resildas-boutique.vercel.app

      # Report is uploaded as a downloadable artifact on the Actions run page
      # even when tests fail — that's the actual "QA report" your friend
      # would otherwise be producing manually.
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14